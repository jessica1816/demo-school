<!DOCTYPE html>
<html>
<head>
    <title>Register - Demo School</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }

        form {
            background: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 8px;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .container {
    width: 400px;
    background: white;
    padding: 25px;
    margin: 80px auto;
    border-radius: 15px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
    text-align: center;
}
    </style>
</head>

<body>

    <div class="container">
 
    <h1>Student Registration</h1>

    <form onsubmit="showMessage(); return false;">
        <input type="text" placeholder="Full Name" required><br>
        <input type="email" placeholder="Email" required><br>
        <input type="number" placeholder="Class" required><br>
        <button type="submit">Register</button>
    </form>
</div>
    <br>
    <a href="index.html">⬅ Back to Home</a>

    <div id="popup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6);">

    <div style="background:white; width:350px; padding:20px; margin:150px auto; border-radius:10px; text-align:center;">
        <h2 style="color:green;">🎉 Congratulations!</h2>
        <p><b>Your Registration is Successful!</b></p>
        <button onclick="closePopup()" style="padding:8px 15px; background:blue; color:white; border:none; border-radius:5px;">
            OK
        </button>
    </div>

</div>

<script>
    function showMessage() {
        document.getElementById("popup").style.display = "block";
    }

    function closePopup() {
        document.getElementById("popup").style.display = "none";
    }
</script>

</body>
</html>
