<!DOCTYPE html>
<html>
<head>
    <title>Students - Demo School</title>
    <style>
    body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #2193b0, #6dd5ed);
}

.container {
    width: 500px;
    background: white;
    padding: 30px;
    margin: 80px auto;
    border-radius: 15px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
    text-align: center;
}

h1 {
    color: #0d3b66;
}

ul {
    list-style: none;
    padding: 0;
}

ul li {
    background: #2193b0;
    color: white;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

ul li:hover {
    background: #17617a;
}
</style>
<body>

<div class="container">

    <h1>Students Section</h1>
    <p>Select Your Class:</p>

    <ul>
        <li>Class 1</li>
        <li>Class 2</li>
        <li>Class 3</li>
        <li>Class 4</li>
        <li>Class 5</li>
    </ul>

    <br>
    <a href="index.html">⬅ Back to Home</a>

</div>

</body>
</html>
